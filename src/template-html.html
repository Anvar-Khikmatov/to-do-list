<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo-List</title>
</head>
<body>
    
    <button class="add-project">Add project</button>
     <!-- <dialog id="my-modal"> -->
      <div class="temp-form"> 
        <form>
            <input type="text" id="project-input" placeholder="Project Title">
        </form>

        <button id="close-modal">close</button>
        <button id="create-project">create</button>
    <!-- </dialog> -->
</div>
    <!-- <dialog id="task-modal"> -->
        <form>
            <input type="text" id="title" placeholder="Task Title">
            <input type="text" id="description" placeholder="Task Description">
            <input type="date" id="date" selected>
            <select id="priority"> Select priority
                <option value=""  hidden >Select priority</option>
                <option value="high">High</option>
                <option value="medium">Medium</option>
                <option value="low">Low</option>        
            </select>
        </form>

        <button id="close-task-modal">close</button>
        <button id="create-task">create</button>
    <!-- </dialog> -->


</body>
</html>
